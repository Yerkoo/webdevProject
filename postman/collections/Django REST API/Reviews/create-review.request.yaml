$kind: http-request
name: Create Review
method: POST
url: '{{baseUrl}}/api/reviews/'
order: 2000
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{accessToken}}'
body:
  type: json
  content: |-
    {
      "rating": 5,
      "comment": "Great course!",
      "course": "{{courseId}}"
    }
