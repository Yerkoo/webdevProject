$kind: http-request
name: Register
method: POST
url: '{{baseUrl}}/api/auth/register/'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "student1",
      "email": "student1@example.com",
      "password": "Password123!",
      "password_confirm": "Password123!"
    }
