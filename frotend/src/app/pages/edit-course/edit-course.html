
<div class="form-container">
  <h2>Edit course</h2>

  <div class="form-group">
    <label>Course Name</label>
    <input type="text" name="courseName" [(ngModel)]="courseName" placeholder="Enter course name">
  </div>

  <div class="form-group">
    <label>Course Description</label>
    <textarea name="courseDesc" [(ngModel)]="courseDescription" rows="4" placeholder="What will these lessons be about?"></textarea>
  </div>

  <div class="form-group">
    <label>YouTube Video Link</label>
    <input type="text" name="youtubeLink" [(ngModel)]="youtubeLink" placeholder="https://www.youtube.com/watch?v=...">
  </div>

  <div class="form-group">
    <label>Category</label>
    <select name="category" [(ngModel)]="selectedCategoryId" class="custom-select">
      <option value="" disabled selected>Choose a category...</option>
      
      @for (cat of categories; track cat.id) {
        <option [value]="cat.id">{{ cat.name }}</option>
      }
    </select>
  </div>
  
  <div class="form-group">
    <label>Cover Image URL</label>
    <input type="text" name="avatar" [(ngModel)]="avatarUrl" placeholder="https://example.com/image.jpg">
    
    <div class="preview-box" *ngIf="avatarUrl">
      <span>Cover Preview:</span>
      <img [src]="avatarUrl" alt="Course Cover Preview" (error)="avatarUrl = ''">
    </div>
  </div>
  <div class="form-actions">
    <button class="submit-btn" (click)="onSubmit()">Update Course</button>
  </div>
</div>
