<div class="main-page">
  <header class="topbar">
    <div class="brand">
      <div class="brand-logo">LOGO</div>

      <div class="brand-text">
        <h1>Online-Course</h1>
        <p>Learn • Grow • Succeed</p>
      </div>
    </div>
    <div class="nav-bar">
        <a routerLink="/main/course" routerLinkActive="active-link" class="nav-btn">Course</a>
        <a routerLink="/main/create" routerLinkActive="active-link" class="nav-btn">Create Course</a>
    </div>
    <div class="user-panel">
      <div class="user-avatar">
        {{ userName[0] }}{{ userName[1] || '' }}
      </div>

      <div class="user-meta">
        <h3>{{ userName }}</h3>
        <p>{{ userEmail }}</p>
      </div>

      <button class="logout-btn" (click)="logout()" title="Logout">
        →
      </button>
    </div>
  </header>
  <router-outlet></router-outlet>
</div>
