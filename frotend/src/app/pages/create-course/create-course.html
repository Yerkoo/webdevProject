<div class="form-container">
  <h2>Create new course</h2>

  <div class="form-group">
    <label>Course Name</label>
    <input type="text" [(ngModel)]="courseName" placeholder="Enter course name">
  </div>

  <div class="form-group">
    <label>Course Description</label>
    <textarea [(ngModel)]="courseDescription" rows="4" placeholder="What will these lessons be about?"></textarea>
  </div>

  <div class="form-group content-box">
    <label>YouTube Video Link</label>
    <input type="text" [(ngModel)]="youtubeLink" placeholder="https://www.youtube.com/watch?v=...">
  </div>

  <button class="submit-btn" (click)="onSubmit()">Publish Course</button>
</div>
